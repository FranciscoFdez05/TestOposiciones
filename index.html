<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Oposiciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 5px;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 10px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .bloques-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 10px;
            background: #f8f9fa;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .bloque-btn {
            padding: 10px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
            white-space: nowrap;
        }

        .bloque-btn:active {
            background: #667eea;
            color: white;
            transform: scale(0.95);
        }

        .bloque-btn.active {
            background: #667eea;
            color: white;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
        }

        .tema-dropdown {
            margin-bottom: 10px;
        }

        .dropdown-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .dropdown-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .pregunta-container {
            position: relative;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .pregunta-container.activa {
            display: flex;
            flex-direction: column;
        }

        .pregunta-numero {
            font-size: 16px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .pregunta-texto {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .opciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            flex: 1;
        }

        .opcion {
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .opcion-letra {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            border-radius: 50%;
            font-weight: bold;
            flex-shrink: 0;
            color: #666;
            font-size: 18px;
        }

        .opcion-texto {
            flex: 1;
        }

        .opcion:active:not(.respondida) {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(4px);
        }

        .opcion.respondida {
            cursor: default;
            border-width: 3px;
        }

        .opcion.correcta {
            background: #d4edda;
            border-color: #28a745;
        }

        .opcion.correcta .opcion-letra {
            background: #28a745;
            color: white;
        }

        .opcion.incorrecta {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .opcion.incorrecta .opcion-letra {
            background: #dc3545;
            color: white;
        }

        .feedback {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .feedback.correcto {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrecto {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .controles {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 0;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-siguiente {
            background: #667eea;
            color: white;
        }

        .btn-anterior {
            background: #ddd;
            color: #333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progreso {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .barra-progreso {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }

        .barra-progreso-llena {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .seleccionar-tema {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .btn-cerrar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #eee;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-cerrar:hover {
            background: #ddd;
            color: #333;
        }

        @media (max-width: 600px) {
            .bloques-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 10px;
            }

            .bloque-btn {
                padding: 12px;
                font-size: 15px;
            }

            .header h1 {
                font-size: 26px;
            }

            .pregunta-texto {
                font-size: 19px;
            }

            .opcion {
                padding: 18px;
                font-size: 17px;
            }
        }

        .btn-siguiente.pulse {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 12px rgba(102, 126, 234, 0.6); }
            100% { transform: scale(1); }
        }

        .cargando {
            text-align: center;
            color: #667eea;
            padding: 40px 20px;
            font-size: 18px;
        }

        .cargando::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .resultados {
            text-align: center;
            padding: 20px;
        }

        .resultados-score {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .resultados-texto {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .resultados-desglose {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .desglose-item {
            flex: 1;
            max-width: 130px;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }

        .desglose-correctas {
            background: #d4edda;
            color: #155724;
        }

        .desglose-incorrectas {
            background: #f8d7da;
            color: #721c24;
        }

        .desglose-num {
            font-size: 28px;
            display: block;
        }

        .btn-reintentar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-reintentar:hover {
            opacity: 0.9;
        }

        .tema-controles {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-mezclar {
            padding: 10px 14px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            color: #667eea;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-mezclar:hover {
            background: #667eea;
            color: white;
        }

        .btn-mezclar.activo {
            background: #667eea;
            color: white;
        }

        @media (orientation: portrait) {
            body {
                padding: 5px;
            }

            .container {
                height: calc(100dvh - 10px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Test Oposiciones</h1>
            <p>Practica y prepárate</p>
        </div>

        <div class="bloques-container" id="bloques">
            <!-- Se rellena dinámicamente -->
        </div>

        <div class="content">
            <div class="tema-dropdown" id="temaDropdown" style="display:none">
                <div class="tema-controles">
                    <select class="dropdown-select" id="temaSelect">
                        <option value="">Selecciona un tema...</option>
                    </select>
                    <button class="btn-mezclar" id="btnMezclar" title="Mezclar preguntas">⇄</button>
                </div>
            </div>

            <div class="pregunta-container activa" id="noTemaSeleccionado">
                <div class="seleccionar-tema">
                    <p>👈 Selecciona un bloque y un tema para comenzar</p>
                </div>
            </div>

            <div class="pregunta-container" id="preguntaContainer">
                <button class="btn-cerrar" id="btnCerrar" title="Cerrar test">✕</button>
                <div class="pregunta-numero" id="preguntaNumero"></div>
                <div class="pregunta-texto" id="preguntaTexto"></div>
                <div class="opciones" id="opciones"></div>
                <div class="feedback" id="feedback"></div>
                <div class="progreso">
                    <div class="barra-progreso">
                        <div class="barra-progreso-llena" id="barraProgreso"></div>
                    </div>
                    <div id="contadorProgreso"></div>
                </div>
                <div class="controles">
                    <button class="btn btn-anterior" id="btnAnterior">← Anterior</button>
                    <button class="btn btn-siguiente" id="btnSiguiente">Siguiente →</button>
                </div>
            </div>

            <div class="pregunta-container" id="resultadosContainer">
                <div class="resultados">
                    <div style="font-size:22px; font-weight:bold; color:#333; margin-bottom:6px">Resultado final</div>
                    <div class="resultados-score" id="resultadosScore"></div>
                    <div class="resultados-texto" id="resultadosTexto"></div>
                    <div class="resultados-desglose">
                        <div class="desglose-item desglose-correctas">
                            <span class="desglose-num" id="numCorrectas"></span>Correctas
                        </div>
                        <div class="desglose-item desglose-incorrectas">
                            <span class="desglose-num" id="numIncorrectas"></span>Incorrectas
                        </div>
                    </div>
                    <button class="btn-reintentar" id="btnReintentar">Repetir test</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const estructura = {
            B1: { nombre: 'Bloque 1', temas: 9 },
            B2: { nombre: 'Bloque 2', temas: 5 },
            B3: { nombre: 'Bloque 3', temas: 9 },
            B4: { nombre: 'Bloque 4', temas: 10 },
            S1: { nombre: 'Series 1', temas: 0 },
            S2: { nombre: 'Series 2', temas: 0 },
            S3: { nombre: 'Series 3', temas: 0 },
            S4: { nombre: 'Series 4', temas: 0 }
        };

        let bloqueActual = null;
        let temaActual = null;
        let preguntaActual = 0;
        let preguntas = [];
        let respuestas = {};
        let mezclarActivo = false;

        function inicializarBloques() {
            const contenedor = document.getElementById('bloques');
            Object.keys(estructura).forEach(bloque => {
                const btn = document.createElement('button');
                btn.className = 'bloque-btn';
                btn.textContent = bloque;
                btn.onclick = () => seleccionarBloque(bloque, btn);
                contenedor.appendChild(btn);
            });
        }

        function seleccionarBloque(bloque, btn) {
            document.querySelectorAll('.bloque-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            bloqueActual = bloque;
            temaActual = null;
            preguntaActual = 0;
            preguntas = [];
            respuestas = {};

            ocultarTodosContenedores();
            document.getElementById('noTemaSeleccionado').classList.add('activa');

            const numTemas = estructura[bloque].temas;
            const dropdown = document.getElementById('temaDropdown');

            if (numTemas === 0) {
                dropdown.style.display = 'none';
                document.querySelector('#noTemaSeleccionado .seleccionar-tema p').textContent =
                    '⚠️ Este bloque aún no tiene temas disponibles';
                return;
            }

            document.querySelector('#noTemaSeleccionado .seleccionar-tema p').textContent =
                '👆 Selecciona un tema para comenzar';

            dropdown.style.display = '';
            const select = document.getElementById('temaSelect');
            select.value = '';
            select.innerHTML = '<option value="">Selecciona un tema...</option>';
            for (let i = 1; i <= numTemas; i++) {
                const option = document.createElement('option');
                option.value = `Tema${i}`;
                option.textContent = `Tema ${i}`;
                select.appendChild(option);
            }
        }

        function ocultarTodosContenedores() {
            document.getElementById('preguntaContainer').classList.remove('activa');
            document.getElementById('noTemaSeleccionado').classList.remove('activa');
            document.getElementById('resultadosContainer').classList.remove('activa');
        }

        function cerrarTest() {
            ocultarTodosContenedores();
            document.getElementById('noTemaSeleccionado').classList.add('activa');
            document.querySelectorAll('.bloque-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('temaDropdown').style.display = 'none';
            document.getElementById('temaSelect').value = '';
            bloqueActual = null;
            temaActual = null;
            preguntaActual = 0;
            preguntas = [];
            respuestas = {};
        }

        async function cargarTema(tema) {
            temaActual = tema;
            preguntaActual = 0;
            respuestas = {};

            ocultarTodosContenedores();
            document.getElementById('noTemaSeleccionado').classList.add('activa');
            document.querySelector('#noTemaSeleccionado .seleccionar-tema p').innerHTML =
                '<span class="cargando">Cargando</span>';

            try {
                const url = `Preguntas/${bloqueActual}/${tema}.json`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('No se pudo cargar el tema');

                const data = await response.json();
                preguntas = [...data.preguntas];
                if (mezclarActivo) mezclar(preguntas);

                mostrarPregunta(0);
            } catch (error) {
                document.querySelector('#noTemaSeleccionado .seleccionar-tema p').textContent =
                    '❌ Error al cargar: ' + error.message;
            }
        }

        function mezclar(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        document.getElementById('temaSelect').addEventListener('change', (e) => {
            const tema = e.target.value;
            if (!tema || !bloqueActual) return;
            cargarTema(tema);
        });

        document.getElementById('btnMezclar').addEventListener('click', () => {
            mezclarActivo = !mezclarActivo;
            document.getElementById('btnMezclar').classList.toggle('activo', mezclarActivo);
            if (temaActual) cargarTema(temaActual);
        });

        function mostrarPregunta(indice) {
            if (indice < 0 || indice >= preguntas.length) return;

            preguntaActual = indice;
            const pregunta = preguntas[indice];

            document.getElementById('preguntaNumero').textContent =
                `Pregunta ${indice + 1} de ${preguntas.length}`;
            document.getElementById('preguntaTexto').textContent = pregunta.enunciado;

            const contenedorOpciones = document.getElementById('opciones');
            contenedorOpciones.innerHTML = '';

            const letras = ['A', 'B', 'C', 'D'];
            pregunta.opciones.forEach((texto, idx) => {
                const div = document.createElement('div');
                div.className = 'opcion';

                if (respuestas[indice] !== undefined) {
                    div.classList.add('respondida');
                    if (idx === pregunta.correcta) div.classList.add('correcta');
                    else if (idx === respuestas[indice]) div.classList.add('incorrecta');
                } else {
                    div.onclick = () => responderPregunta(idx);
                }

                div.innerHTML = `<span class="opcion-letra">${letras[idx]}</span><span class="opcion-texto">${texto}</span>`;
                contenedorOpciones.appendChild(div);
            });

            const feedback = document.getElementById('feedback');
            feedback.classList.remove('correcto', 'incorrecto');
            if (respuestas[indice] !== undefined) {
                if (respuestas[indice] === pregunta.correcta) {
                    feedback.textContent = '✓ ¡Correcto!';
                    feedback.classList.add('correcto');
                } else {
                    feedback.textContent = `✗ Incorrecto. La respuesta correcta es la ${letras[pregunta.correcta]}`;
                    feedback.classList.add('incorrecto');
                }
            }

            const respondidas = Object.keys(respuestas).length;
            document.getElementById('barraProgreso').style.width = (respondidas / preguntas.length * 100) + '%';
            document.getElementById('contadorProgreso').textContent = `${respondidas}/${preguntas.length} respondidas`;

            ocultarTodosContenedores();
            document.getElementById('preguntaContainer').classList.add('activa');
            document.getElementById('preguntaContainer').scrollTop = 0;
            actualizarControles();
        }

        function responderPregunta(opcionSeleccionada) {
            respuestas[preguntaActual] = opcionSeleccionada;
            mostrarPregunta(preguntaActual);

            const respondidas = Object.keys(respuestas).length;
            if (respondidas === preguntas.length) {
                setTimeout(mostrarResultados, 600);
                return;
            }

            if (preguntaActual < preguntas.length - 1) {
                const btnSig = document.getElementById('btnSiguiente');
                btnSig.classList.remove('pulse');
                void btnSig.offsetWidth;
                btnSig.classList.add('pulse');
            }
        }

        function mostrarResultados() {
            const total = preguntas.length;
            const correctas = preguntas.filter((p, i) => respuestas[i] === p.correcta).length;
            const incorrectas = total - correctas;
            const pct = Math.round(correctas / total * 100);

            document.getElementById('resultadosScore').textContent = `${pct}%`;
            document.getElementById('resultadosTexto').textContent =
                pct >= 60 ? '¡Buen resultado! Sigue practicando.' : 'Sigue estudiando, ¡tú puedes!';
            document.getElementById('numCorrectas').textContent = correctas;
            document.getElementById('numIncorrectas').textContent = incorrectas;

            ocultarTodosContenedores();
            document.getElementById('resultadosContainer').classList.add('activa');
        }

        function actualizarControles() {
            document.getElementById('btnAnterior').disabled = preguntaActual === 0;
            document.getElementById('btnSiguiente').disabled = preguntaActual === preguntas.length - 1;
        }

        document.getElementById('btnCerrar').addEventListener('click', cerrarTest);
        document.getElementById('btnAnterior').addEventListener('click', () => mostrarPregunta(preguntaActual - 1));
        document.getElementById('btnSiguiente').addEventListener('click', () => mostrarPregunta(preguntaActual + 1));

        document.getElementById('btnReintentar').addEventListener('click', () => {
            if (temaActual) cargarTema(temaActual);
        });

        document.addEventListener('keydown', (e) => {
            const container = document.getElementById('preguntaContainer');
            if (!container.classList.contains('activa')) return;
            if (e.key === 'ArrowLeft') mostrarPregunta(preguntaActual - 1);
            if (e.key === 'ArrowRight') mostrarPregunta(preguntaActual + 1);
        });

        inicializarBloques();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Oposiciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .bloques-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 15px;
            background: #f8f9fa;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .bloque-btn {
            padding: 12px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .bloque-btn:active {
            background: #667eea;
            color: white;
            transform: scale(0.95);
        }

        .bloque-btn.active {
            background: #667eea;
            color: white;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .tema-dropdown {
            margin-bottom: 20px;
        }

        .dropdown-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .dropdown-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .pregunta-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .pregunta-container.activa {
            display: flex;
            flex-direction: column;
        }

        .pregunta-numero {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .pregunta-texto {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .opciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            flex: 1;
        }

        .opcion {
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .opcion-letra {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #f0f0f0;
            border-radius: 50%;
            font-weight: bold;
            flex-shrink: 0;
            color: #666;
        }

        .opcion-texto {
            flex: 1;
        }

        .opcion:active:not(.respondida) {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(4px);
        }

        .opcion.respondida {
            cursor: default;
            border-width: 3px;
        }

        .opcion.correcta {
            background: #d4edda;
            border-color: #28a745;
        }

        .opcion.correcta .opcion-letra {
            background: #28a745;
            color: white;
        }

        .opcion.incorrecta {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .opcion.incorrecta .opcion-letra {
            background: #dc3545;
            color: white;
        }

        .feedback {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .feedback.correcto {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrecto {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .controles {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-siguiente {
            background: #667eea;
            color: white;
        }

        .btn-anterior {
            background: #ddd;
            color: #333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progreso {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .barra-progreso {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }

        .barra-progreso-llena {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .seleccionar-tema {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 600px) {
            .bloques-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 10px;
            }

            .bloque-btn {
                padding: 10px;
                font-size: 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .pregunta-texto {
                font-size: 16px;
            }

            .opcion {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (orientation: portrait) {
            body {
                padding: 5px;
            }

            .container {
                height: 100dvh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Test Oposiciones</h1>
            <p>Practica y prepárate</p>
        </div>

        <div class="bloques-container" id="bloques">
            <!-- Se rellena dinámicamente -->
        </div>

        <div class="content">
            <div class="tema-dropdown">
                <select class="dropdown-select" id="temaSelect">
                    <option value="">Selecciona un tema...</option>
                </select>
            </div>

            <div class="pregunta-container activa" id="noTemaSeleccionado">
                <div class="seleccionar-tema">
                    <p>👈 Selecciona un bloque y un tema para comenzar</p>
                </div>
            </div>

            <div class="pregunta-container" id="preguntaContainer">
                <div class="pregunta-numero" id="preguntaNumero"></div>
                <div class="pregunta-texto" id="preguntaTexto"></div>
                <div class="opciones" id="opciones"></div>
                <div class="feedback" id="feedback"></div>
                <div class="progreso">
                    <div class="barra-progreso">
                        <div class="barra-progreso-llena" id="barraProgreso"></div>
                    </div>
                    <div id="contadorProgreso"></div>
                </div>
                <div class="controles">
                    <button class="btn btn-anterior" id="btnAnterior">← Anterior</button>
                    <button class="btn btn-siguiente" id="btnSiguiente">Siguiente →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de bloques y temas
        const estructura = {
            B1: { nombre: 'Bloque 1', temas: 7 },
            B2: { nombre: 'Bloque 2', temas: 6 },
            B3: { nombre: 'Bloque 3', temas: 6 },
            B4: { nombre: 'Bloque 4', temas: 6 },
            S1: { nombre: 'Series 1', temas: 6 },
            S2: { nombre: 'Series 2', temas: 6 },
            S3: { nombre: 'Series 3', temas: 6 },
            S4: { nombre: 'Series 4', temas: 6 }
        };

        let bloqueActual = null;
        let temaActual = null;
        let preguntaActual = 0;
        let preguntas = [];
        let respuestas = {};

        // Crear botones de bloques
        function inicializarBloques() {
            const contenedor = document.getElementById('bloques');
            Object.keys(estructura).forEach(bloque => {
                const btn = document.createElement('button');
                btn.className = 'bloque-btn';
                btn.textContent = bloque;
                btn.onclick = () => seleccionarBloque(bloque, btn);
                contenedor.appendChild(btn);
            });
        }

        // Seleccionar bloque
        function seleccionarBloque(bloque, btn) {
            // Actualizar botón activo
            document.querySelectorAll('.bloque-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            bloqueActual = bloque;
            temaActual = null;
            preguntaActual = 0;
            preguntas = [];
            respuestas = {};

            // Actualizar dropdown de temas
            const select = document.getElementById('temaSelect');
            select.innerHTML = '<option value="">Selecciona un tema...</option>';

            const numTemas = estructura[bloque].temas;
            for (let i = 1; i <= numTemas; i++) {
                const option = document.createElement('option');
                option.value = `Tema${i}`;
                option.textContent = `Tema ${i}`;
                select.appendChild(option);
            }
        }

        // Cargar tema
        document.getElementById('temaSelect').addEventListener('change', async (e) => {
            const tema = e.target.value;
            if (!tema || !bloqueActual) return;

            temaActual = tema;
            preguntaActual = 0;
            respuestas = {};

            try {
                const url = `Preguntas/${bloqueActual}/${tema}.json`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('No se pudo cargar el tema');
                
                const data = await response.json();
                preguntas = data.preguntas;

                // Mostrar primer pregunta
                mostrarPregunta(0);
                actualizarControles();
            } catch (error) {
                alert('Error al cargar el tema: ' + error.message);
            }
        });

        // Mostrar pregunta
        function mostrarPregunta(indice) {
            if (indice < 0 || indice >= preguntas.length) return;

            preguntaActual = indice;
            const pregunta = preguntas[indice];

            // Actualizar UI
            document.getElementById('preguntaNumero').textContent = 
                `Pregunta ${indice + 1} de ${preguntas.length}`;
            document.getElementById('preguntaTexto').textContent = pregunta.enunciado;

            // Limpiar opciones
            const contenedorOpciones = document.getElementById('opciones');
            contenedorOpciones.innerHTML = '';

            // Agregar opciones
            const letraOpciones = ['A', 'B', 'C', 'D'];
            pregunta.opciones.forEach((texto, idx) => {
                const div = document.createElement('div');
                div.className = 'opcion';

                // Si ya se respondió, mostrar resultado
                if (respuestas[indice] !== undefined) {
                    div.classList.add('respondida');
                    if (idx === pregunta.correcta) {
                        div.classList.add('correcta');
                    } else if (idx === respuestas[indice]) {
                        div.classList.add('incorrecta');
                    }
                } else {
                    // Si no se respondió, permitir seleccionar
                    div.onclick = () => responderPregunta(idx, pregunta.correcta);
                }

                div.innerHTML = `
                    <span class="opcion-letra">${letraOpciones[idx]}</span>
                    <span class="opcion-texto">${texto}</span>
                `;
                contenedorOpciones.appendChild(div);
            });

            // Mostrar feedback si ya se respondió
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('correcto', 'incorrecto');
            if (respuestas[indice] !== undefined) {
                if (respuestas[indice] === pregunta.correcta) {
                    feedback.textContent = '✓ ¡Correcto!';
                    feedback.classList.add('correcto');
                } else {
                    feedback.textContent = '✗ Incorrecto. La respuesta correcta es la ' + ['A', 'B', 'C', 'D'][pregunta.correcta];
                    feedback.classList.add('incorrecto');
                }
            }

            // Actualizar barra de progreso
            const respondidas = Object.keys(respuestas).length;
            const porcentaje = (respondidas / preguntas.length) * 100;
            document.getElementById('barraProgreso').style.width = porcentaje + '%';
            document.getElementById('contadorProgreso').textContent = 
                `${respondidas}/${preguntas.length} respondidas`;

            // Mostrar contenedor de preguntas
            document.getElementById('noTemaSeleccionado').classList.remove('activa');
            document.getElementById('preguntaContainer').classList.add('activa');
        }

        // Responder pregunta
        function responderPregunta(opcionSeleccionada, correcta) {
            respuestas[preguntaActual] = opcionSeleccionada;
            mostrarPregunta(preguntaActual);
        }

        // Actualizar controles
        function actualizarControles() {
            const btnAnterior = document.getElementById('btnAnterior');
            const btnSiguiente = document.getElementById('btnSiguiente');

            btnAnterior.disabled = preguntaActual === 0;
            btnSiguiente.disabled = preguntaActual === preguntas.length - 1;

            btnAnterior.onclick = () => mostrarPregunta(preguntaActual - 1);
            btnSiguiente.onclick = () => mostrarPregunta(preguntaActual + 1);
        }

        // Event listeners para controles
        document.getElementById('btnAnterior').addEventListener('click', () => {
            mostrarPregunta(preguntaActual - 1);
        });

        document.getElementById('btnSiguiente').addEventListener('click', () => {
            mostrarPregunta(preguntaActual + 1);
        });

        // Inicializar
        inicializarBloques();
    </script>
</body>
</html>
